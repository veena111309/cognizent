<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Onboarding</title>
    <style>
        #promotionBanner {
            background-color: darkslategrey;
            color: aliceblue;
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .urgentAlert {
            background-color: crimson;
            color: white;
            padding: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="promotionBanner">
        <h1>Welcome, New Resident!</h1>
        <p>Complete your civic profile online and secure a <span style="color: gold; font-weight: bold;">free public transit pass</span> for the first month!</p>
        <p class="urgentAlert">Registration window closes on July 31st.</p>
        <p class="urgentAlert">Limited passes available. Claim yours now.</p>
    </div>
</body>
</html>
