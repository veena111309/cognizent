<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Inclusion Methods</title>
    <!-- Internal Styling -->
    <style>
        h1 {
            color: midnightblue;
            border-bottom: 2px solid midnightblue;
        }
    </style>
    <!-- External Link -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <h1 style="text-align: center;">Portal Styling Test</h1> <!-- Inline -->
    <p class="summary-paragraph">This paragraph uses external styles from style.css.</p>
</body>
</html>
