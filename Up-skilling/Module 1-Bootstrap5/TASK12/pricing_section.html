<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container py-5">
        <div class="row text-center align-items-stretch g-4">
            <div class="col-md-4">
                <div class="card h-100 p-4 border-primary">
                    <h4>Basic Ticket</h4>
                    <p class="display-6 fw-bold">$10</p>
                    <p>Admission to general grounds.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 p-4 bg-primary text-white">
                    <h4>VIP Gold Pass</h4>
                    <p class="display-6 fw-bold">$49</p>
                    <p>Access to catered seating.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 p-4">
                    <h4>Platinum Plus</h4>
                    <p class="display-6 fw-bold">$99</p>
                    <p>All access plus dinner vouchers.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
