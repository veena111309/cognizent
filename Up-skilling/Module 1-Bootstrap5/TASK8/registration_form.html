<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Component</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-5" style="max-width: 500px;">
        <h3 class="mb-4">Join Community</h3>
        <form>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" placeholder="First Name" />
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control" placeholder="Last Name" />
                </div>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email" />
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="consentCheck" />
                <label class="form-check-label" for="consentCheck">I agree to updates</label>
            </div>
            <button type="submit" class="btn btn-success">Create Profile</button>
        </form>
    </div>
</body>
</html>
