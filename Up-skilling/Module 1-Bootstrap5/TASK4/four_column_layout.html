<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Four Column Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-4">
        <div class="row text-center">
            <div class="col-sm-6 col-lg-3 border p-3 bg-light">Col 1</div>
            <div class="col-sm-6 col-lg-3 border p-3 bg-light">Col 2</div>
            <div class="col-sm-6 col-lg-3 border p-3 bg-light">Col 3</div>
            <div class="col-sm-6 col-lg-3 border p-3 bg-light">Col 4</div>
        </div>
    </div>
</body>
</html>
