<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Case Transforms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-3">
        <p class="text-uppercase text-danger fw-bold">This is capitalized alert messaging.</p>
        <p class="text-lowercase text-muted">THIS IS LOWERCASE MUTED TEXT.</p>
    </div>
</body>
</html>
