<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reorder Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col order-last border p-3 bg-warning">I appear last in view</div>
            <div class="col order-first border p-3 bg-success text-white">I appear first in view</div>
            <div class="col border p-3 bg-light">I am default position</div>
        </div>
    </div>
</body>
</html>
